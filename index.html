```html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gürbulak Terminal</title>
    <!-- Mobil Uygulama Görünümü İçin -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; -webkit-tap-highlight-color: transparent; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        ::-webkit-scrollbar { display: none; }
        /* Modal Animasyonları */
        .modal-enter { opacity: 1 !important; pointer-events: auto !important; }
        .modal-content-enter { transform: translateY(0) !important; }
    </style>
</head>
<body class="selection:bg-zinc-800 pb-24">

    <!-- Üst Bilgi -->
    <header class="pt-6 pb-4 px-6 sticky top-0 bg-black/90 backdrop-blur-md z-40 border-b border-zinc-900">
        <h1 class="text-xl font-black uppercase tracking-widest text-center text-white">Gürbulak Terminal</h1>
    </header>

    <!-- Ana İçerik Buraya Gelecek -->
    <main id="app-root" class="p-4 max-w-md mx-auto"></main>

    <!-- Toast (Bildirim) Mesajı -->
    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full font-bold text-sm shadow-xl z-50 transition-opacity duration-300 opacity-0 pointer-events-none">
        Mesaj
    </div>

    <!-- İş/Gider Ekleme Modalı -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/80 flex items-end justify-center z-50 p-4 pb-24 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-md rounded-3xl p-6 shadow-2xl transform transition-transform duration-300 translate-y-full" id="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-bold">Başlık</h3>
                <button onclick="closeModal()" class="text-zinc-500 text-3xl font-light active:scale-90">&times;</button>
            </div>
            <div id="modal-body" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
        </div>
    </div>

    <!-- Alt Menü -->
    <nav class="fixed bottom-0 w-full max-w-md left-1/2 -translate-x-1/2 bg-zinc-950 border-t border-zinc-900 pb-6 pt-3 px-6 flex justify-around items-center h-20 z-40">
        <button onclick="switchTab('SHIFT')" id="tab-shift" class="flex flex-col items-center gap-1 text-white active:scale-95 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span class="text-[10px] font-bold uppercase tracking-wider mt-1">Vardiya</span>
        </button>
        <button onclick="switchTab('HISTORY')" id="tab-history" class="flex flex-col items-center gap-1 text-zinc-600 active:scale-95 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
            <span class="text-[10px] font-bold uppercase tracking-wider mt-1">Geçmiş</span>
        </button>
    </nav>

    <script>
        // --- İŞ MANTIĞI VE VERİLER ---
        const PRICING = [
            { id: 'tam', label: 'Tam Tespit', amount: 7000 },
            { id: 'yarim', label: 'Yarım Tespit', amount: 3500 },
            { id: 'koridor', label: 'Koridor', amount: 3500 },
            { id: 'kapak', label: 'Kapak', amount: 1250 },
            { id: 'sontaj', label: 'Sontaj', amount: 1250 },
            { id: 'palet', label: 'Palet Başı', amount: 1000 },
            { id: 'mazot', label: 'Mazot', amount: 1000 }
        ];

        const EXPENSE_TYPES = [
            { id: 'yemek', label: 'Yemek Masrafı' },
            { id: 'cay', label: 'Çay / Su / Market' },
            { id: 'avans', label: 'Ara Avans' },
            { id: 'diger', label: 'Diğer Gider' }
        ];

        // Hafıza Yönetimi
        let state = JSON.parse(localStorage.getItem('gurbulak_state')) || {
            activeTab: 'SHIFT',
            activeShift: null,
            history: []
        };

        function saveState() {
            localStorage.setItem('gurbulak_state', JSON.stringify(state));
            render();
        }

        // Yardımcı Fonksiyonlar
        const formatMoney = (amount) => new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', maximumFractionDigits: 0 }).format(amount);
        const generateId = () => Math.random().toString(36).substr(2, 9);
        const getTimestamp = () => new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString('tr-TR', { weekday: 'long', month: 'long', day: 'numeric' });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }

        // --- AKSİYONLAR ---
        function switchTab(tab) {
            state.activeTab = tab;
            document.getElementById('tab-shift').className = `flex flex-col items-center gap-1 active:scale-95 transition-transform ${tab === 'SHIFT' ? 'text-white' : 'text-zinc-600'}`;
            document.getElementById('tab-history').className = `flex flex-col items-center gap-1 active:scale-95 transition-transform ${tab === 'HISTORY' ? 'text-white' : 'text-zinc-600'}`;
            render();
        }

        function startShift() {
            state.activeShift = {
                id: generateId(),
                date: new Date().toISOString(),
                workerCount: 15,
                transactions: [],
            };
            saveState();
            showToast('Yeni Vardiya Başladı!');
        }

        function closeShift() {
            if (confirm('Vardiyayı kapatıp arşive eklemek istediğine emin misin?')) {
                state.history.unshift({ ...state.activeShift, status: 'CLOSED' });
                state.activeShift = null;
                state.activeTab = 'HISTORY';
                showToast('Vardiya arşive eklendi.');
                saveState();
            }
        }

        function updateWorkerCount(delta) {
            if (!state.activeShift) return;
            const newCount = Math.max(1, state.activeShift.workerCount + delta);
            state.activeShift.workerCount = newCount;
            saveState();
        }

        function addTransaction(type, category, amount) {
            state.activeShift.transactions.unshift({
                id: generateId(),
                type,
                category,
                amount: parseInt(amount),
                timestamp: getTimestamp()
            });
            closeModal();
            showToast(type === 'INCOME' ? 'İş Eklendi!' : 'Gider Eklendi!');
            saveState();
        }

        function deleteTransaction(id) {
            if(confirm('Bu işlemi silmek istiyor musun?')) {
                state.activeShift.transactions = state.activeShift.transactions.filter(t => t.id !== id);
                saveState();
            }
        }

        function calculateMetrics(transactions, workerCount) {
            let gross = 0, expense = 0, count = 0;
            transactions.forEach(t => {
                if (t.type === 'INCOME') { gross += t.amount; count++; }
                else { expense += t.amount; }
            });
            const net = gross - expense;
            const perPerson = Math.floor(net / Math.max(1, workerCount));
            return { gross, expense, net, perPerson, count };
        }

        function copyShareText(index) {
            const shift = state.history[index];
            const m = calculateMetrics(shift.transactions, shift.workerCount);
            const text = `Gürbulak Kasa Özeti\nTarih: ${formatDate(shift.date)}\nİşlenen İş/Tır: ${m.count}\nToplam Brüt: ${formatMoney(m.gross)}\nGiderler: ${formatMoney(m.expense)}\nÇalışan: ${shift.workerCount} Kişi\n\n📌 Kişi Başı Net Yevmiye: ${formatMoney(m.perPerson)}`;
            
            // Telefondan kopyalamak için güvenli yöntem
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast('Özet WhatsApp için kopyalandı!'));
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast('Özet WhatsApp için kopyalandı!');
                } catch (err) {
                    showToast('Kopyalama başarısız oldu.');
                }
                textArea.remove();
            }
        }

        // --- MODAL (AÇILIR PENCERE) İŞLEMLERİ ---
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContent = document.getElementById('modal-content');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');

        function openIncomeModal() {
            modalTitle.innerText = 'Yeni İş Ekle';
            let html = '';
            PRICING.forEach(item => {
                html += `
                <button onclick="addTransaction('INCOME', '${item.label}', ${item.amount})" class="w-full bg-zinc-950 border border-zinc-800 p-4 rounded-xl flex justify-between items-center active:scale-95 transition-transform mb-2">
                    <span class="font-semibold text-lg text-white">${item.label}</span>
                    <span class="font-bold tabular-nums text-green-400">+${formatMoney(item.amount)}</span>
                </button>`;
            });
            modalBody.innerHTML = html;
            showModal();
        }

        function openExpenseModal() {
            modalTitle.innerText = 'Gider Ekle';
            let options = EXPENSE_TYPES.map(t => `<option value="${t.label}">${t.label}</option>`).join('');
            modalBody.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <label class="text-sm text-zinc-400 mb-2 block">Gider Türü</label>
                        <select id="exp-category" class="w-full bg-zinc-950 border border-zinc-800 text-white rounded-xl px-4 py-4 h-14 outline-none">
                            ${options}
                        </select>
                    </div>
                    <div>
                        <label class="text-sm text-zinc-400 mb-2 block">Tutar (₺)</label>
                        <input id="exp-amount" type="number" placeholder="Örn: 500" class="w-full bg-zinc-950 border border-zinc-800 text-white rounded-xl px-4 py-4 h-14 outline-none text-xl font-bold tabular-nums"/>
                    </div>
                    <button onclick="submitExpense()" class="w-full bg-white text-black font-bold text-lg rounded-xl h-14 mt-4 active:scale-95 transition-transform">
                        Gideri Kaydet
                    </button>
                </div>
            `;
            showModal();
        }

        function submitExpense() {
            const cat = document.getElementById('exp-category').value;
            const amt = document.getElementById('exp-amount').value;
            if(!amt || amt <= 0) return showToast('Geçerli bir tutar girin!');
            addTransaction('EXPENSE', cat, amt);
        }

        function showModal() {
            modalOverlay.classList.add('modal-enter');
            modalContent.classList.add('modal-content-enter');
        }

        function closeModal() {
            modalOverlay.classList.remove('modal-enter');
            modalContent.classList.remove('modal-content-enter');
        }

        // --- EKRAN ÇİZİM (RENDER) MOTORU ---
        const appRoot = document.getElementById('app-root');

        function render() {
            if (state.activeTab === 'SHIFT') {
                if (!state.activeShift) {
                    appRoot.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-[60vh] text-center space-y-6 animate-in fade-in">
                            <div class="w-24 h-24 bg-zinc-900 rounded-full flex items-center justify-center mb-4 border border-zinc-800 shadow-xl">
                                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-400"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
                            </div>
                            <h2 class="text-2xl font-bold">Vardiya Kapalı</h2>
                            <p class="text-zinc-500 px-4 text-sm">Hesaplamalara başlamak için yeni bir vardiya oturumu açın.</p>
                            <button onclick="startShift()" class="w-full max-w-xs bg-white text-black font-bold text-lg rounded-xl h-14 active:scale-95 transition-transform mt-8 shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                                Yeni Vardiya Başlat
                            </button>
                        </div>
                    `;
                } else {
                    const m = calculateMetrics(state.activeShift.transactions, state.activeShift.workerCount);
                    
                    let txHtml = state.activeShift.transactions.length === 0 
                        ? `<p class="text-center text-zinc-600 text-sm py-8 bg-zinc-950 rounded-2xl border border-zinc-900 shadow-inner">Henüz işlem eklenmedi.</p>`
                        : state.activeShift.transactions.map(tx => `
                            <div class="bg-zinc-900/80 border border-zinc-800 p-4 rounded-2xl flex justify-between items-center mb-3">
                                <div>
                                    <p class="font-bold text-base text-white">${tx.category}</p>
                                    <p class="text-xs text-zinc-500 mt-1">${tx.timestamp}</p>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="font-bold tabular-nums ${tx.type === 'INCOME' ? 'text-green-400' : 'text-red-400'}">
                                        ${tx.type === 'INCOME' ? '+' : '-'}${formatMoney(tx.amount)}
                                    </span>
                                    <button onclick="deleteTransaction('${tx.id}')" class="text-zinc-600 hover:text-red-500 p-2 active:scale-75 transition-transform">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                    </button>
                                </div>
                            </div>
                        `).join('');

                    appRoot.innerHTML = `
                        <div class="space-y-6 pb-8">
                            <!-- Dashboard -->
                            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 relative overflow-hidden shadow-2xl">
                                <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-bl-full -mr-10 -mt-10 pointer-events-none"></div>
                                <p class="text-zinc-400 text-[11px] font-bold uppercase tracking-widest mb-1">Kişi Başı Net Yevmiye</p>
                                <h1 class="text-5xl font-black tabular-nums tracking-tighter text-white mb-6">${formatMoney(m.perPerson)}</h1>
                                
                                <div class="grid grid-cols-2 gap-4 border-t border-zinc-800 pt-5">
                                    <div>
                                        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-wider mb-1">Brüt Kasa</p>
                                        <p class="font-bold tabular-nums text-lg text-white">${formatMoney(m.gross)}</p>
                                    </div>
                                    <div>
                                        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-wider mb-1">Giderler</p>
                                        <p class="font-bold tabular-nums text-lg text-red-400">-${formatMoney(m.expense)}</p>
                                    </div>
                                </div>
                                
                                <div class="flex items-center justify-between mt-6 bg-black p-3 rounded-xl border border-zinc-800">
                                    <div class="flex items-center gap-2 text-zinc-400">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                        <span class="text-sm font-semibold">Aktif Çalışan</span>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <button onclick="updateWorkerCount(-1)" class="w-10 h-10 bg-zinc-800 active:bg-zinc-700 rounded-lg text-2xl font-light flex items-center justify-center">-</button>
                                        <span class="font-black text-2xl w-10 text-center tabular-nums">${state.activeShift.workerCount}</span>
                                        <button onclick="updateWorkerCount(1)" class="w-10 h-10 bg-zinc-800 active:bg-zinc-700 rounded-lg text-2xl font-light flex items-center justify-center">+</button>
                                    </div>
                                </div>
                            </div>

                            <!-- Butonlar -->
                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="openIncomeModal()" class="bg-white text-black font-bold rounded-2xl p-4 flex flex-col items-center justify-center gap-2 h-24 shadow-lg active:scale-95 transition-transform">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                                    <span class="text-sm">İş Ekle</span>
                                </button>
                                <button onclick="openExpenseModal()" class="bg-zinc-900 border border-zinc-800 text-white font-bold rounded-2xl p-4 flex flex-col items-center justify-center gap-2 h-24 active:scale-95 transition-transform">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>
                                    <span class="text-sm">Gider Ekle</span>
                                </button>
                            </div>

                            <!-- Son İşlemler -->
                            <div class="mt-8">
                                <div class="flex justify-between items-center mb-4 px-2">
                                    <h3 class="font-bold text-zinc-400 text-xs tracking-widest uppercase">Son İşlemler</h3>
                                    <span class="text-[10px] text-zinc-400 font-bold bg-zinc-900 border border-zinc-800 px-2 py-1 rounded-md tracking-wider">${m.count} İŞLEM</span>
                                </div>
                                ${txHtml}
                            </div>
                            
                            ${state.activeShift.transactions.length > 0 ? `
                            <button onclick="closeShift()" class="w-full border border-red-900/50 text-red-500 font-bold rounded-xl p-4 mt-8 bg-red-950/20 active:bg-red-950/50 transition-colors">
                                Vardiyayı Kapat ve Arşivle
                            </button>` : ''}
                        </div>
                    `;
                }
            } else {
                // GEÇMİŞ (HISTORY) SEKME
                let historyHtml = state.history.length === 0 
                    ? `<div class="text-center py-16 text-zinc-600"><p class="font-medium">Geçmiş kayıt bulunmuyor.</p></div>`
                    : state.history.map((shift, index) => {
                        const m = calculateMetrics(shift.transactions, shift.workerCount);
                        return `
                            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 mb-4 shadow-lg">
                                <div class="flex justify-between items-center mb-5 border-b border-zinc-800 pb-4">
                                    <div>
                                        <h3 class="font-bold text-lg text-white mb-1">${formatDate(shift.date)}</h3>
                                        <p class="text-xs text-zinc-400 font-medium">${shift.workerCount} Kişi • ${m.count} İşlem</p>
                                    </div>
                                    <button onclick="copyShareText(${index})" class="bg-zinc-800 p-3 rounded-xl text-white active:scale-90 transition-transform flex items-center justify-center gap-2">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>
                                    </button>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <p class="text-[10px] text-zinc-500 font-bold tracking-wider mb-1">BRÜT</p>
                                        <p class="font-bold tabular-nums text-white">${formatMoney(m.gross)}</p>
                                    </div>
                                    <div>
                                        <p class="text-[10px] text-zinc-500 font-bold tracking-wider mb-1">GİDER</p>
                                        <p class="font-bold tabular-nums text-red-400">-${formatMoney(m.expense)}</p>
                                    </div>
                                    <div class="col-span-2 bg-black p-4 rounded-xl border border-zinc-800 mt-2 flex flex-col items-center">
                                        <p class="text-[10px] text-zinc-500 font-bold tracking-wider mb-1 text-center">KİŞİ BAŞI NET</p>
                                        <p class="font-black text-3xl text-center tabular-nums text-green-400">${formatMoney(m.perPerson)}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                appRoot.innerHTML = `
                    <div class="space-y-4 pb-8">
                        <h2 class="text-2xl font-black px-2 mb-6">Geçmiş Vardiyalar</h2>
                        ${historyHtml}
                    </div>
                `;
            }
        }

        // İlk Yükleme
        render();
    </script>
</body>
</html>


```
